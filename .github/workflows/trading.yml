name: Bot de trading parallèle (paper)

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

# SÉCURITÉ : token en lecture seule
permissions:
  contents: read

# SÉCURITÉ : jamais deux exécutions en même temps
concurrency:
  group: bot-trading
  cancel-in-progress: false

# ADAPTATION : tout le projet vit dans le sous-dossier bot-trading-v2/
defaults:
  run:
    working-directory: bot-trading-v2

jobs:
  preparer:
    runs-on: ubuntu-latest
    outputs:
      matrice: ${{ steps.liste.outputs.fichiers }}
    steps:
      - uses: actions/checkout@v4
      - name: Lister les fichiers d'univers
        id: liste
        run: |
          FICHIERS=$(ls univers/*.txt | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "Workers détectés : $FICHIERS"
          echo "fichiers=$FICHIERS" >> "$GITHUB_OUTPUT"

  analyse:
    needs: preparer
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        fichier: ${{ fromJSON(needs.preparer.outputs.matrice) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Analyser cet univers (console ci-dessous)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          FICHIER_UNIVERS: ${{ matrix.fichier }}
        run: python analyse.py "$FICHIER_UNIVERS"
      - name: Nom d'artefact
        id: nom
        env:
          FICHIER_UNIVERS: ${{ matrix.fichier }}
        run: echo "nom=$(basename "$FICHIER_UNIVERS" .txt)" >> "$GITHUB_OUTPUT"
      - name: Publier les scores pour le chef d'orchestre
        uses: actions/upload-artifact@v4
        with:
          name: resultats-${{ steps.nom.outputs.nom }}
          path: bot-trading-v2/resultats/
          retention-days: 1

  trading:
    needs: analyse
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Récupérer les résultats de tous les workers
        uses: actions/download-artifact@v4
        with:
          pattern: resultats-*
          path: bot-trading-v2/resultats/
          merge-multiple: true
      - name: Agréger et trader (console ci-dessous)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python trader.py
